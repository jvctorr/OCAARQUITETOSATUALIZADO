<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login Admin · OCA Arquitetos</title>

  <script>
    (function () {
      const savedTheme = localStorage.getItem("oca-theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================
       DARK MODE / LOGIN PREMIUM
    ========================= */

    body.admin-body {
      transition: background 0.3s ease, color 0.3s ease;
    }

    .admin-theme-toggle {
      position: fixed;
      top: 22px;
      right: 24px;
      z-index: 9999;

      display: inline-flex;
      align-items: center;
      gap: 10px;

      border: 1px solid rgba(90, 70, 48, 0.16);
      border-radius: 999px;
      padding: 8px 14px 8px 8px;

      background: rgba(255, 255, 255, 0.78);
      color: #2c2119;

      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: -0.01em;

      box-shadow:
        0 18px 50px rgba(40, 28, 20, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      cursor: pointer;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease;
    }

    .admin-theme-toggle:hover {
      transform: translateY(-2px);
      border-color: rgba(138, 103, 67, 0.26);
      box-shadow:
        0 22px 60px rgba(40, 28, 20, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .theme-toggle-track {
      width: 44px;
      height: 26px;
      border-radius: 999px;
      padding: 3px;

      display: flex;
      align-items: center;

      background: linear-gradient(135deg, #f4eadc, #d7c1a2);
      box-shadow: inset 0 2px 8px rgba(60, 43, 28, 0.14);
      transition: 0.25s ease;
    }

    .theme-toggle-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      background: #ffffff;
      color: #2c2119;

      font-size: 0.72rem;
      box-shadow: 0 5px 14px rgba(55, 38, 24, 0.22);
      transform: translateX(0);
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        color 0.25s ease;
    }

    .theme-toggle-label {
      white-space: nowrap;
    }

    html[data-theme="dark"] .admin-body {
      background:
        radial-gradient(circle at top left, rgba(180, 145, 100, 0.13), transparent 34%),
        linear-gradient(135deg, #080706 0%, #14100d 55%, #090807 100%);
      color: #f5efe7;
    }

    html[data-theme="dark"] .login-page {
      background:
        radial-gradient(circle at 20% 20%, rgba(202, 166, 113, 0.14), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05), transparent 28%);
    }

    html[data-theme="dark"] .login-card,
    html[data-theme="dark"] .glass {
      background: rgba(22, 18, 14, 0.82);
      border-color: rgba(226, 205, 173, 0.18);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }

    html[data-theme="dark"] .login-card h1,
    html[data-theme="dark"] .brand-text,
    html[data-theme="dark"] .admin-form label {
      color: #f6efe6;
    }

    html[data-theme="dark"] .muted {
      color: rgba(246, 239, 230, 0.68);
    }

    html[data-theme="dark"] .eyebrow {
      color: #d9b98c;
    }

    html[data-theme="dark"] .admin-form input {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(226, 205, 173, 0.18);
      color: #f6efe6;
    }

    html[data-theme="dark"] .admin-form input::placeholder {
      color: rgba(246, 239, 230, 0.42);
    }

    html[data-theme="dark"] .admin-form input:focus {
      border-color: rgba(217, 185, 140, 0.72);
      box-shadow: 0 0 0 4px rgba(217, 185, 140, 0.12);
    }

    html[data-theme="dark"] .admin-message {
      color: rgba(246, 239, 230, 0.8);
    }

    html[data-theme="dark"] .admin-message.success {
      color: #9ee6b2;
    }

    html[data-theme="dark"] .admin-message.error {
      color: #ff9d9d;
    }

    html[data-theme="dark"] .admin-theme-toggle {
      background: rgba(18, 15, 12, 0.82);
      color: #f6efe6;
      border-color: rgba(226, 205, 173, 0.18);

      box-shadow:
        0 18px 55px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    html[data-theme="dark"] .admin-theme-toggle:hover {
      border-color: rgba(217, 185, 140, 0.34);
      box-shadow:
        0 22px 65px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    html[data-theme="dark"] .theme-toggle-track {
      background: linear-gradient(135deg, #2a2119, #9f7c4e);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.32);
    }

    html[data-theme="dark"] .theme-toggle-thumb {
      transform: translateX(18px);
      background: #15110d;
      color: #f7e7c8;
    }

    @media (max-width: 520px) {
      .admin-theme-toggle {
        top: 16px;
        right: 16px;
        padding: 7px;
      }

      .theme-toggle-label {
        display: none;
      }
    }
  </style>
</head>

<body class="admin-body">
  <button class="admin-theme-toggle" type="button" id="themeToggle" aria-label="Alternar modo escuro">
    <span class="theme-toggle-track">
      <span class="theme-toggle-thumb" id="themeIcon">🌙</span>
    </span>
    <span class="theme-toggle-label" id="themeLabel">Modo escuro</span>
  </button>

  <main class="login-page">
    <section class="login-card glass">
      <a href="index.html" class="brand login-brand">
        <img src="assets/images/logo.jpg" alt="OCA Arquitetos" class="brand-mark" />
        <span class="brand-text"><strong>OCA</strong> Arquitetos</span>
      </a>

      <span class="eyebrow">Painel administrativo</span>
      <h1>Entrar no painel</h1>
      <p class="muted">Acesse para editar projetos, textos, contatos e configurações do site.</p>

      <form id="loginForm" class="admin-form">
        <label>
          Usuário ou e-mail
          <input id="loginUser" type="text" placeholder="ADMIN" autocomplete="username" required />
        </label>

        <label>
          Senha
          <input id="loginPassword" type="password" placeholder="Digite a senha" autocomplete="current-password" required />
        </label>

        <button class="btn btn-primary admin-full" type="submit">Entrar</button>
        <p id="loginMessage" class="admin-message"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const themeLabel = document.getElementById("themeLabel");

    function updateThemeButton() {
      const currentTheme = document.documentElement.getAttribute("data-theme");

      if (currentTheme === "dark") {
        themeIcon.textContent = "☀️";
        themeLabel.textContent = "Modo claro";
      } else {
        themeIcon.textContent = "🌙";
        themeLabel.textContent = "Modo escuro";
      }
    }

    themeToggle.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const nextTheme = currentTheme === "dark" ? "light" : "dark";

      document.documentElement.setAttribute("data-theme", nextTheme);
      localStorage.setItem("oca-theme", nextTheme);
      updateThemeButton();
    });

    updateThemeButton();

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("loginMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      msg.textContent = "Entrando...";
      msg.className = "admin-message";

      const rawUser = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPassword").value;
      const email = rawUser.toUpperCase() === "ADMIN" ? window.OCA_ADMIN_EMAIL : rawUser;

      const { error } = await window.ocaSupabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.textContent = "Usuário ou senha inválidos.";
        msg.className = "admin-message error";
        return;
      }

      msg.textContent = "Login realizado com sucesso!";
      msg.className = "admin-message success";

      setTimeout(() => {
        window.location.href = "admin.html";
      }, 450);
    });
  </script>
</body>
</html>
